name: Update YouTube-Music Cask

on:
  schedule:
    # Run once every day at 3:15 AM UTC
    - cron: '15 3 * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  update-cask:
    runs-on: macos-latest

    steps:
      - name: Checkout Your Repository
        uses: actions/checkout@v4

      - name: Update Cask File
        run: |
          # Define the cask file path
          CASK_FILE="Casks/youtube-music.rb"

          # 1. Get the latest release information directly from the GitHub API
          echo "Fetching latest release data for th-ch/youtube-music..."
          API_DATA=$(curl -s "https://api.github.com/repos/th-ch/youtube-music/releases/latest")
          
          # Extract the latest version number (e.g., "3.10.0" from "v3.10.0")
          LATEST_VERSION=$(echo "$API_DATA" | jq -r '.tag_name' | sed 's/^v//')
          
          # Get the download URL for the arm64 asset
          DOWNLOAD_URL=$(echo "$API_DATA" | jq -r '.assets[] | select(.name | endswith("-arm64.dmg")) | .browser_download_url')

          # 2. Get the current version from your cask file
          CURRENT_VERSION=$(grep 'version "' "$CASK_FILE" | cut -d '"' -f 2)

          echo "Latest version is $LATEST_VERSION. Current version is $CURRENT_VERSION."

          # 3. Compare versions and update if necessary
          if [ "$LATEST_VERSION" = "$CURRENT_VERSION" ]; then
            echo "Cask is already up-to-date."
            exit 0
          fi
          
          echo "New version found. Updating cask file..."
          
          # 4. Calculate the new SHA256 checksum by downloading the file
          echo "Calculating SHA256 for $DOWNLOAD_URL..."
          NEW_SHA=$(curl -sL "$DOWNLOAD_URL" | shasum -a 256 | cut -d' ' -f1)
          echo "New SHA256 is $NEW_SHA"

          # 5. Update the version and sha256 in the cask file
          sed -i '' "s/version \"${CURRENT_VERSION}\"/version \"${LATEST_VERSION}\"/" "$CASK_FILE"
          sed -i '' "s/sha256 \"[a-f0-9]*\"/sha256 \"${NEW_SHA}\"/" "$CASK_FILE"
          
          echo "Cask file updated successfully."

          # 6. Configure git and commit the changes
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add "$CASK_FILE"
          git commit -m "Update youtube-music cask to ${LATEST_VERSION}"
          git push
