# .github/workflows/update-cask.yml
name: Update YouTube-Music Cask

on:
  # Run once every day at 3:15 AM UTC
  schedule:
    - cron: '15 3 * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  update-cask:
    runs-on: macos-latest

    steps:
      - name: Checkout Your Tap Repository
        uses: actions/checkout@v4

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Get Latest Version Info
        id: livecheck
        run: |
          # Point Homebrew to this local tap
          brew tap --force-auto-update "$GITHUB_REPOSITORY" file://.

          # Run livecheck and capture the JSON output
          JSON_OUTPUT=$(brew livecheck --cask --json youtube-music)
          echo "LIVECHECK_JSON=$JSON_OUTPUT" >> $GITHUB_ENV

      - name: Update Cask File
        id: update_cask
        run: |
          # Extract new version and SHAs from the JSON output
          LATEST_VERSION=$(echo "${{ env.LIVECHECK_JSON }}" | jq -r '.[] | select(.cask == "youtube-music") | .version.latest')
          ARM_SHA=$(echo "${{ env.LIVECHECK_JSON }}" | jq -r '.[] | select(.cask == "youtube-music") | .version.arm_sha256')
          INTEL_SHA=$(echo "${{ env.LIVECHECK_JSON }}" | jq -r '.[] | select(.cask == "youtube-music") | .version.intel_sha256')
          CURRENT_VERSION=$(grep 'version "' youtube-music.rb | cut -d '"' -f 2)

          # Check if the version has changed
          if [ "$LATEST_VERSION" = "$CURRENT_VERSION" ]; then
            echo "Cask is already up-to-date. Version: $CURRENT_VERSION"
            echo "UPDATED=false" >> $GITHUB_ENV
          else
            echo "New version available: $LATEST_VERSION. Updating cask..."
            # Use sed to replace the version and sha256 lines
            sed -i '' "s/version \"${CURRENT_VERSION}\"/version \"${LATEST_VERSION}\"/" youtube-music.rb
            sed -i '' "s/sha256 arm:   \"[a-f0-9]*\"/sha256 arm:   \"${ARM_SHA}\"/" youtube-music.rb
            sed -i '' "s/intel:  \"[a-f0-9]*\"/intel:  \"${INTEL_SHA}\"/" youtube-music.rb
            echo "UPDATED=true" >> $GITHUB_ENV
            echo "NEW_VERSION=${LATEST_VERSION}" >> $GITHUB_ENV
          fi

      - name: Commit and Push Changes
        if: env.UPDATED == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add youtube-music.rb
          git commit -m "Update youtube-music cask to ${{ env.NEW_VERSION }}"
          git push
