# .github/workflows/main.yml
name: Update YouTube-Music Cask

on:
  schedule:
    - cron: '15 3 * * *'
  workflow_dispatch:

jobs:
  update-cask:
    runs-on: macos-latest

    steps:
      - name: Checkout Your Tap Repository
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Get Latest Version Info
        id: livecheck
        run: |
          # Correct path to the cask file inside the 'Casks' directory.
          JSON_OUTPUT=$(brew livecheck --cask --json ./Casks/youtube-music.rb)
          echo "LIVECHECK_JSON=$JSON_OUTPUT" >> $GITHUB_ENV

      - name: Update Cask File
        id: update_cask
        run: |
          CASK_FILE="Casks/youtube-music.rb"

          LATEST_VERSION=$(echo "${{ env.LIVECHECK_JSON }}" | jq -r '.[] | select(.cask == "youtube-music") | .version.latest')
          ARM_SHA=$(echo "${{ env.LIVECHECK_JSON }}" | jq -r '.[] | select(.cask == "youtube-music") | .version.arm_sha256')
          CURRENT_VERSION=$(grep 'version "' "$CASK_FILE" | cut -d '"' -f 2)

          if [ "$LATEST_VERSION" = "$CURRENT_VERSION" ]; then
            echo "Cask is already up-to-date. Version: $CURRENT_VERSION"
            echo "UPDATED=false" >> $GITHUB_ENV
          else
            echo "New version available: $LATEST_VERSION. Updating cask..."
            # Update the correct file path with sed
            sed -i '' "s/version \"${CURRENT_VERSION}\"/version \"${LATEST_VERSION}\"/" "$CASK_FILE"
            sed -i '' "s/sha256 \"[a-f0-9]*\"/sha256 \"${ARM_SHA}\"/" "$CASK_FILE"
            echo "UPDATED=true" >> $GITHUB_ENV
            echo "NEW_VERSION=${LATEST_VERSION}" >> $GITHUB_ENV
          fi

      - name: Commit and Push Changes
        if: env.UPDATED == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Add the correct file path to git
          git add Casks/youtube-music.rb
          git commit -m "Update youtube-music cask to ${{ env.NEW_VERSION }}"
          git push
